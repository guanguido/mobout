name: Deploy to Strato

on:
  push:
    branches: [master, develop]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set deploy target
        id: target
        run: |
          if [ "${{ github.ref_name }}" = "master" ]; then
            echo "path=/mnt/web410/c1/52/59703252/htdocs/mobout.de/production/" >> $GITHUB_OUTPUT
          else
            echo "path=/mnt/web410/c1/52/59703252/htdocs/mobout.de/staging/" >> $GITHUB_OUTPUT
          fi

      - name: Inject build info
        run: |
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"
          BUILD_TS=$(TZ='Europe/Berlin' date -d "${{ github.event.head_commit.timestamp }}" '+%Y-%m-%d %H:%M' 2>/dev/null || echo "${{ github.event.head_commit.timestamp }}")
          BUILD_INFO="$SHORT_SHA | $BUILD_TS"
          sed -i "s#__BUILD_INFO__#$BUILD_INFO#g" index.html

      - name: Export Git-Änderungshistorie
        run: |
          git fetch origin master:refs/remotes/origin/master 2>/dev/null || true
          PROD_HEAD=$(git rev-parse origin/master 2>/dev/null || echo "${{ github.sha }}")
          {
            echo "PRODUCTION_HEAD=$PROD_HEAD"
            git log --pretty=format:'%H%x1f%an%x1f%aI%x1f%P%x1f%s'
          } > admin/changelog-data.txt

      - name: Deploy to Strato
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.STRATO_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.STRATO_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true
          rsync -avz --delete --exclude=data/ -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            index.html \
            motd.php \
            contact.php \
            counter.php \
            expeditions.php \
            expedition-image.php \
            members.php \
            member-image.php \
            site-config.php \
            admin \
            mitglieder \
            ${{ secrets.STRATO_USER }}@${{ secrets.STRATO_HOST }}:${{ steps.target.outputs.path }}

          # Kein Basic Auth mehr im Mitgliederbereich (individuelle Accounts statt
          # geteiltem Login) - kein .htpasswd-Seed-Schritt noetig. accounts.json,
          # email-templates.json, consent-log/ und die data/-Haertung entstehen zur
          # Laufzeit (member_ensure_data_hardening() in mitglieder/member-auth.php)
          # und sind ueber --exclude=data/ bereits deploy-sicher.
