name: Deploy to Strato

on:
  push:
    branches: [master, develop]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set deploy target
        id: target
        run: |
          if [ "${{ github.ref_name }}" = "master" ]; then
            echo "path=/mnt/web410/c1/52/59703252/htdocs/mobout.de/production/" >> $GITHUB_OUTPUT
          else
            echo "path=/mnt/web410/c1/52/59703252/htdocs/mobout.de/staging/" >> $GITHUB_OUTPUT
          fi

      - name: Inject build info
        run: |
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"
          BUILD_TS=$(TZ='Europe/Berlin' date -d "${{ github.event.head_commit.timestamp }}" '+%Y-%m-%d %H:%M' 2>/dev/null || echo "${{ github.event.head_commit.timestamp }}")
          BUILD_INFO="$SHORT_SHA | $BUILD_TS"
          sed -i "s#__BUILD_INFO__#$BUILD_INFO#g" index.html

      - name: Inject member-area auth path
        run: |
          DEPLOY_PATH="${{ steps.target.outputs.path }}"
          sed -i "s#__HTPASSWD_PATH__#${DEPLOY_PATH}mitglieder/.htpasswd#g" mitglieder/.htaccess

      - name: Deploy to Strato
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.STRATO_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.STRATO_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true
          rsync -avz -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            index.html \
            mitglieder \
            ${{ secrets.STRATO_USER }}@${{ secrets.STRATO_HOST }}:${{ steps.target.outputs.path }}
